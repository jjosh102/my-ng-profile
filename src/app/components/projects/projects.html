@if (isLoading()) {
<ul class="grid grid-cols-1 md:grid-cols-2 gap-6">
  @for (i of [].constructor(10); track i) {
  <app-project-card-skeleton />
  }
</ul>
}

@else {
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8 mt-12">
  <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
    <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
    </svg>
    Projects
  </h2>

  <div class="relative group max-w-sm w-full">
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <svg class="w-4 h-4 text-gray-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input
      type="text"
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
      placeholder="Search projects..."
      class="block w-full pl-10 pr-4 py-2 bg-white dark:bg-[#0d1117] border border-gray-200 dark:border-gray-800 rounded-xl text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
    />
  </div>
</div>

<div class="flex flex-wrap gap-2 mb-8">
  <button
    (click)="selectedLanguage.set(null)"
    [class]="!selectedLanguage() ? 'bg-blue-500 text-white border-blue-500' : 'bg-white dark:bg-[#0d1117] text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-800 hover:border-blue-500/50'"
    class="px-4 py-1.5 rounded-xl text-xs font-bold border transition-all duration-300 shadow-sm"
  >
    All
  </button>
  @for (lang of languages(); track lang) {
    <button
      (click)="selectedLanguage.set(lang === selectedLanguage() ? null : lang)"
      [class]="lang === selectedLanguage() ? 'ring-2 ring-offset-2 dark:ring-offset-[#0d1117] shadow-lg' : 'opacity-80 hover:opacity-100'"
      [style.background-color]="lang === selectedLanguage() ? (lang | getLanguageColor) : ''"
      [style.border-color]="lang === selectedLanguage() ? (lang | getLanguageColor) : ''"
      [style.color]="lang === selectedLanguage() ? 'white' : ''"
      [style.ring-color]="lang | getLanguageColor"
      class="px-4 py-1.5 rounded-xl text-xs font-bold border border-gray-200 dark:border-gray-800 bg-white dark:bg-[#0d1117] text-gray-600 dark:text-gray-400 transition-all duration-300 shadow-sm"
    >
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full" [style.background-color]="lang === selectedLanguage() ? 'white' : (lang | getLanguageColor)"></span>
        {{ lang }}
      </div>
    </button>
  }
</div>

<div class="w-full">
  @if (filteredRepos().length > 0) {
    <ul class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (repo of filteredRepos(); track repo.id) {
      <app-project-card [repo]=repo />
      }
    </ul>
  } @else {
    <div class="glass p-12 rounded-3xl text-center space-y-4">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-400">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <div>
        <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100">No projects found</h3>
        <p class="text-gray-500 dark:text-gray-400">Try adjusting your search terms</p>
      </div>
      <button
        (click)="searchQuery.set('')"
        class="text-sm font-bold text-blue-600 dark:text-blue-400 hover:underline"
      >
        Clear search
      </button>
    </div>
  }
</div>
}
