<section class="glass p-8 rounded-3xl space-y-6">
  <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div class="space-y-1">
      <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
        <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        Contribution Graph
      </h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Activity and engagement over the past year</p>
    </div>
    <div class="px-4 py-2 rounded-2xl bg-orange-500/10 text-orange-600 dark:text-orange-400 font-bold text-lg">
      {{ overallContributions() }} <span class="text-xs font-medium uppercase tracking-wider ml-1 opacity-70">Total</span>
    </div>
  </header>

  <div class="relative overflow-x-auto pb-4 custom-scrollbar">
    @if(isLoading()){
    <figure class="flex justify-center items-center py-4">
      <div class="animate-pulse grid grid-cols-53 gap-[3px] w-full max-w-4xl">
        @for (item of [].constructor(52 * 7); track $index) {
        <div class="w-3.5 h-3.5 rounded-sm bg-gray-200 dark:bg-gray-800"></div>
        }
      </div>
    </figure>
    }

    <figure [class.hidden]="isLoading()" class="flex justify-center items-center">
      <div class="p-4 rounded-2xl bg-white/50 dark:bg-black/20">
        <canvas width="850" height="150" #heatMap></canvas>
      </div>
      <figcaption class="sr-only">
        Heatmap showing contributions over the year
      </figcaption>
    </figure>
  </div>

  <footer class="flex items-center justify-end gap-2 text-[10px] text-gray-400 uppercase tracking-widest font-bold">
    <span>Less</span>
    <div class="flex gap-1">
      <div class="w-3 h-3 rounded-sm bg-gray-100 dark:bg-gray-800"></div>
      <div class="w-3 h-3 rounded-sm bg-orange-200 dark:bg-orange-900/40"></div>
      <div class="w-3 h-3 rounded-sm bg-orange-400 dark:bg-orange-700/60"></div>
      <div class="w-3 h-3 rounded-sm bg-orange-600 dark:bg-orange-500/80"></div>
    </div>
    <span>More</span>
  </footer>
</section>
