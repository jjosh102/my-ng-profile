<section class="glass p-8 rounded-3xl space-y-6">
  <div class="space-y-1">
    <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
      <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
      </svg>
      Code Frequency
    </h2>
    <p class="text-sm text-gray-500 dark:text-gray-400">Weekly additions and deletions over time</p>
  </div>

  @if (hasData()) {
  <figure class="p-4 rounded-2xl bg-white/50 dark:bg-black/20">
    <canvas #chartCanvas width="400" height="200" aria-label="Code Frequency Chart"></canvas>
  </figure>
  } @else {
  <div class="h-[200px] flex items-center justify-center glass rounded-2xl animate-pulse">
    <p class="text-gray-400 text-sm font-medium italic">Preparing data visualization...</p>
  </div>
  }
</section>
