<section class="glass p-8 rounded-3xl space-y-6">
  <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div class="space-y-1">
      <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
        <div class="p-1.5 rounded-lg bg-orange-500/10 dark:bg-orange-500/20">
          <svg class="w-5 h-5 text-orange-600 dark:text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        Activity Pulse
      </h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Monthly engagement and contribution flow</p>
    </div>
    <div class="flex flex-col items-end">
      <div class="px-4 py-2 rounded-2xl bg-orange-500/10 text-orange-600 dark:text-orange-400 font-black text-2xl shadow-sm border border-orange-500/10">
        {{ overallContributions() }}
      </div>
      <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1 mr-1">Total Pulses</span>
    </div>
  </header>

  <div class="relative h-[200px] w-full">
    @if(isLoading()){
    <div class="absolute inset-0 flex items-center justify-center bg-white/50 dark:bg-black/10 rounded-2xl animate-pulse">
      <p class="text-sm font-bold text-gray-400 italic">Syncing activity pulse...</p>
    </div>
    }

    <div [class.hidden]="isLoading()" class="h-full w-full">
      <canvas #activityPulse aria-label="Activity Pulse Chart" role="img"></canvas>
    </div>
  </div>

  <footer class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-800/50">
    <div class="flex items-center gap-4">
       <div class="flex items-center gap-2">
         <div class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]"></div>
         <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Active Growth</span>
       </div>
    </div>
    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic opacity-70">
      Last updated today
    </p>
  </footer>
</section>
