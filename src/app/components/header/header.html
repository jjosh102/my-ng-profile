<header class="sticky top-0 z-50 w-full border-b border-gray-200/50 dark:border-gray-800/50 bg-white/80 dark:bg-[#0d1117]/80 backdrop-blur-xl transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3 group cursor-pointer" [routerLink]="['']">
      <div class="relative p-0.5 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 group-hover:rotate-12 transition-transform duration-500">
        <img class="w-9 h-9 rounded-full bg-white dark:bg-[#0d1117] p-0.5" src="mascot-purple.png" />
      </div>
      <nav class="text-gray-900 dark:text-gray-100 font-extrabold text-xl tracking-tighter group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
        jjosh102
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <button (click)="onThemeToggle()"
        class="relative flex items-center justify-center w-11 h-11 rounded-2xl transition-all duration-500 focus:outline-none group overflow-hidden glass hover:scale-110 active:scale-95"
        [ngClass]="{
              'text-yellow-500': !isDarkTheme(),
              'text-blue-400': isDarkTheme()
            }">
        <span class="absolute inset-0 bg-gradient-to-tr from-blue-500/10 to-purple-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></span>

        <svg *appTheme="'dark'" class="w-5 h-5 relative z-10 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]" viewBox="0 0 20 20" fill="currentColor">
          <path
            d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z" />
        </svg>

        <svg *appTheme="'light'" class="w-6 h-6 relative z-10 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z" />
        </svg>
      </button>
    </div>
  </div>
</header>
