<section class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
  <aside class="lg:col-span-3">
    <div class="sticky top-8">
      <app-user-profile-card />
    </div>
  </aside>

  <section class="lg:col-span-9 space-y-12">
    <!-- Overview & Top Languages -->
    <article>
      <app-stats />
    </article>

    <!-- Projects -->
    <article>
      <app-projects />
    </article>


    <!-- Deep Dive Tabs -->
    <div class="space-y-8 pt-8 border-t border-gray-200/50 dark:border-gray-800/50">
      <div class="flex items-center justify-center p-1 bg-gray-100/80 dark:bg-gray-800/40 rounded-2xl w-full max-w-lg mx-auto backdrop-blur-md">
        <button 
          (click)="setActiveTab('skills')"
          [class]="activeTab() === 'skills' ? 'bg-white dark:bg-[#0d1117] text-blue-600 dark:text-blue-400 shadow-lg' : 'text-gray-500 hover:text-gray-900 dark:hover:text-gray-100'"
          class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-black transition-all duration-300">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
          </svg>
          SKILLS
        </button>
        <button 
          (click)="setActiveTab('experience')"
          [class]="activeTab() === 'experience' ? 'bg-white dark:bg-[#0d1117] text-blue-600 dark:text-blue-400 shadow-lg' : 'text-gray-500 hover:text-gray-900 dark:hover:text-gray-100'"
          class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-black transition-all duration-300">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          JOURNEY
        </button>
        <button 
          (click)="setActiveTab('analyzer')"
          [class]="activeTab() === 'analyzer' ? 'bg-white dark:bg-[#0d1117] text-blue-600 dark:text-blue-400 shadow-lg' : 'text-gray-500 hover:text-gray-900 dark:hover:text-gray-100'"
          class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-black transition-all duration-300">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
          MATCH
        </button>
      </div>

      <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
        @if (activeTab() === 'skills') {
          <app-skills />
        } @else if (activeTab() === 'experience') {
          <app-experience />
        } @else if (activeTab() === 'analyzer') {
          <app-compatibility-analyzer />
        }
      </div>
    </div>

    <footer class="pt-12 border-t border-gray-200/50 dark:border-gray-800/50">
      <app-footer />
    </footer>
  </section>
</section>
